name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy

    - name: Check code formatting with black
      run: black --check todo_core todo_web todo_mobile tests

    - name: Check import sorting with isort
      run: isort --check-only todo_core todo_web todo_mobile tests

    - name: Lint with flake8
      run: flake8 todo_core todo_web todo_mobile tests

    - name: Type check with mypy
      run: mypy todo_core --ignore-missing-imports || true
